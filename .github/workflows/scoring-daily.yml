name: 🎯 Daily Stock Scoring (15:30 TPE)

# Phase 2.3 — 每日對 stocks 表每檔跑四象限, upsert current_score/tier。
# 不走 Zeabur backend (會 timeout), 直接在 GitHub Action runner 跑。
on:
  schedule:
    # 15:30 TPE = 07:30 UTC, 週一到週五 (交易日)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max stocks to score (empty = all)'
        required: false
        default: ''

concurrency:
  group: scoring-daily
  cancel-in-progress: false

jobs:
  run:
    name: Score all stocks
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TZ: Asia/Taipei
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run scoring worker
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then
            python -m backend.services.scoring_worker
          else
            python -m backend.services.scoring_worker "$LIMIT"
          fi
