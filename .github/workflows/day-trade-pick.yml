name: ⚡ Day Trade Pick (08:30 TPE)

# 08:20 TPE = 00:20 UTC,內部 wait 到 08:30:00
on:
  schedule:
    - cron: '20 0 * * 1-5'   # Mon-Fri 00:20 UTC = 08:20 TPE
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run'
        type: boolean
        default: false
      force:
        description: 'Force run'
        type: boolean
        default: false

concurrency:
  group: day-trade-pick
  cancel-in-progress: false

jobs:
  run:
    name: Day Trade Pick
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Taipei
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      VINCENT_USER_ID: ${{ secrets.VINCENT_USER_ID }}
      DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
      FORCE: ${{ github.event.inputs.force || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run Day Trade Pick (wait_until 08:30:00)
        run: python scripts/run_day_trade_pick.py
