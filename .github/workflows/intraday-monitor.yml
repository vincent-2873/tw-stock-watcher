name: 👀 Intraday Monitor (09:00-13:30 TPE)

# Loop 模式(spec 10):一次觸發,內部 loop 到收盤
# 08:55 TPE = 00:55 UTC
on:
  schedule:
    - cron: '55 0 * * 1-5'   # Mon-Fri 00:55 UTC = 08:55 TPE
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run'
        type: boolean
        default: false
      loop_mode:
        description: 'Loop (否則只跑一次)'
        type: boolean
        default: true

concurrency:
  group: intraday-monitor
  cancel-in-progress: false

jobs:
  run:
    name: Intraday Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5.5h (09:00 - 13:30 + buffer)
    env:
      TZ: Asia/Taipei
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      VINCENT_USER_ID: ${{ secrets.VINCENT_USER_ID }}
      DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
      LOOP_MODE: ${{ github.event.inputs.loop_mode || '1' }}
      INTRADAY_INTERVAL: '300'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run Intraday Monitor Loop (09:00-13:30)
        run: python scripts/run_intraday_monitor.py --loop
